name: Run Philadelphia PA Address Search Tool

on:
  workflow_dispatch:

  schedule:
    # Runs every 6 hours in UTC time
    - cron: "0 */6 * * *"

jobs:
  run-scraper:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python packages
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Philadelphia scraper
        run: |
          python Philadelphia_PA_AddressSearch_Tool.py

      - name: Upload Excel output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Philadelphia_PA_AddressSearch_Output
          path: "*.xlsx"
          if-no-files-found: warn
